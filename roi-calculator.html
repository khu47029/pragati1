<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ROI Calculator | Pragati Sahayak</title><link rel="stylesheet" href="../assets/css/ps-1000-system.css"></head><body><main class="ps1000-section"><div class="ps1000-wrap"><h1 class="ps1000-title">Website ROI Calculator</h1><form id="roi" class="ps1000-card"><label>Monthly leads <input name="monthlyLeads" type="number" value="30"></label><br><label>Conversion rate % <input name="conversionRate" type="number" value="20"></label><br><label>Average order value ₹ <input name="avgOrderValue" type="number" value="3000"></label><br><button class="ps1000-btn ps1000-primary">Calculate</button></form><div id="out" class="ps1000-card"></div></div></main><script src="../assets/js/ps-1000-core.js"></script><script>document.getElementById('roi').addEventListener('submit',e=>{e.preventDefault(); const data=Object.fromEntries(new FormData(e.target).entries()); const value=PS1000.roi(data); document.getElementById('out').innerHTML='<h2>Estimated monthly value: ₹'+value.toLocaleString('en-IN')+'</h2><p>This is an estimate. Actual results depend on traffic, offer, trust, follow-up and local competition.</p>';});</script></body></html>
