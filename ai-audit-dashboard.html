<!doctype html>
<html lang="en-IN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Online Presence Audit Dashboard | Pragati Sahayak</title>
<meta name="description" content="Premium AI-search-ready digital growth systems for local Indian businesses.">
<link rel="stylesheet" href="../assets/css/ps-ultra-system.css">
<link rel="stylesheet" href="../assets/css/ps-components.css">
<link rel="stylesheet" href="../assets/css/ps-dashboard.css">
<link rel="stylesheet" href="../assets/css/ps-print-report.css">
</head>
<body>
<main class="ps-container">
  <section class="ps-page-hero">
    <p class="ps-kicker">Pragati Sahayak</p>
    <h1>AI Online Presence Audit Dashboard</h1>
    <p class="ps-lead">Premium website add-on for local business trust, lead generation and AI search visibility.</p>
    <p><a class="ps-btn" href="../index.html">Back to Home</a> <a class="ps-btn secondary" href="https://wa.me/">WhatsApp</a></p>
  </section>
  
<form data-ps-audit-form class="ps-card">
  <div class="ps-grid-2"><div><label class="ps-label">Business Name</label><input class="ps-input" name="businessName" placeholder="Example: Sharma Dental Clinic"></div><div><label class="ps-label">Industry</label><input class="ps-input" name="industry" placeholder="Dental, Salon, Gym..."></div></div>
  <div class="ps-grid-3">
    <label><input type="checkbox" name="website" value="yes"> Website available</label>
    <label><input type="checkbox" name="googleProfile" value="yes"> Google Profile complete</label>
    <label><input type="checkbox" name="reviews" value="yes"> Reviews visible</label>
    <label><input type="checkbox" name="whatsapp" value="yes"> WhatsApp CTA</label>
    <label><input type="checkbox" name="services" value="yes"> Services clear</label>
    <label><input type="checkbox" name="gallery" value="yes"> Gallery/portfolio</label>
    <label><input type="checkbox" name="faq" value="yes"> FAQ section</label>
    <label><input type="checkbox" name="schema" value="yes"> Schema markup</label>
    <label><input type="checkbox" name="speed" value="yes"> Mobile speed</label>
    <label><input type="checkbox" name="caseStudy" value="yes"> Case study/proof</label>
  </div>
  <button class="ps-btn" type="submit">Generate Audit</button>
</form>
<div data-ps-audit-output style="margin-top:22px"></div>

</main>
<script src="../assets/js/ps-ultra-core.js"></script>
<script src="../assets/js/ai-audit-engine.js"></script>
</body>
</html>
