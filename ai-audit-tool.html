<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AI Audit Tool | Pragati Sahayak</title><link rel="stylesheet" href="../assets/css/ps-1000-system.css"></head><body><main class="ps1000-section"><div class="ps1000-wrap"><h1 class="ps1000-title">AI Online Presence Audit Tool</h1><form id="audit" class="ps1000-card"><p>Tick items your business already has.</p><label><input name="website" value="yes" type="checkbox"> Website</label><br><label><input name="googleProfile" value="yes" type="checkbox"> Google Profile</label><br><label><input name="reviews" value="yes" type="checkbox"> Reviews</label><br><label><input name="whatsapp" value="yes" type="checkbox"> WhatsApp CTA</label><br><label><input name="photos" value="yes" type="checkbox"> Photos</label><br><label><input name="services" value="yes" type="checkbox"> Service pages</label><br><label><input name="faq" value="yes" type="checkbox"> FAQ</label><br><label><input name="speed" value="yes" type="checkbox"> Fast mobile site</label><br><label><input name="schema" value="yes" type="checkbox"> Schema</label><br><label><input name="content" value="yes" type="checkbox"> Helpful content</label><br><button class="ps1000-btn ps1000-primary" type="submit">Calculate</button></form><div id="out" class="ps1000-card"></div></div></main><script src="../assets/js/ps-1000-core.js"></script><script>document.getElementById('audit').addEventListener('submit',e=>{e.preventDefault(); const score=PS1000.scoreAudit(e.target); document.getElementById('out').innerHTML='<h2>Score: '+score+'/100</h2><p>'+ (score>=75?'Strong system. Improve content and proofs monthly.':'Needs improvement. Add missing trust, FAQ, Google profile and WhatsApp sections.') +'</p>';});</script></body></html>
