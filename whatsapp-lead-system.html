<body class="ps-pro-page">
  <main class="ps-container ps-pro-section">
    <a class="ps-button ps-button-soft" href="../index.html">← Back to Home</a>
    <span class="ps-eyebrow">Pragati Sahayak</span>
    <h1>WhatsApp Lead System for Local Businesses</h1>

    <p>WhatsApp lead system ka goal hai visitor ko simple inquiry path dena: service select karo, business need batao, WhatsApp par ready message send karo.</p>
    <form class="ps-form ps-card" data-ps-whatsapp-builder>
      <label>Business Name <input name="businessName"></label>
      <label>Business Type <input name="businessType"></label>
      <label>Location <input name="location"></label>
      <label>Service Need <select name="serviceNeed"><option>Website</option><option>Google Profile</option><option>WhatsApp Lead System</option><option>SEO</option><option>Full Digital Growth System</option></select></label>
      <label>Budget <select name="budget"><option>Below 15000</option><option>15000-30000</option><option>30000+</option></select></label>
      <label>Timeline <select name="timeline"><option>This week</option><option>This month</option><option>Just exploring</option></select></label>
      <label>Generated Message <textarea data-ps-message-output readonly></textarea></label>
    </form>

  </main>
